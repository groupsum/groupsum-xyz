services:
  groupsum-xyz:
    build: .
    container_name: groupsum-xyz
    restart: unless-stopped
    labels:
      site.host: groupsum.xyz
      site.kind: mdwrk-lander
    expose:
      - "80"
    networks:
      dockerwp:
        aliases:
          - groupsum-xyz

networks:
  dockerwp:
    name: dockerwp
    external: true

---
apiVersion: npmctl.io/v1
schemaVersion: 1
dns_records:
  - provider: namecheap
    zone: groupsum.xyz
    type: A
    name: "@"
    value: __SITE_SERVER_IP__
    ttl: 300
    meta:
      managed_by: npmctl
      owner: groupsum-xyz
      resource_id: dns.groupsum-xyz.root-a
  - provider: namecheap
    zone: groupsum.xyz
    type: A
    name: "*.groupsum.xyz"
    value: __SITE_SERVER_IP__
    ttl: 300
    meta:
      managed_by: npmctl
      owner: groupsum-xyz
      resource_id: dns.groupsum-xyz.wildcard-a
  - provider: namecheap
    zone: groupsum.xyz
    type: CNAME
    name: "www"
    value: groupsum.xyz
    ttl: 300
    meta:
      managed_by: npmctl
      owner: groupsum-xyz
      resource_id: dns.groupsum-xyz.www-cname

---
apiVersion: npmctl.com/v1
schemaVersion: 2
proxy_hosts:
  - domain_names:
      - groupsum.xyz
      - www.groupsum.xyz
    forward_scheme: http
    forward_host: groupsum-xyz
    forward_port: 80
    certificate_id: 7
    ssl_forced: 1
    http2_support: 1
    allow_websocket_upgrade: 1
    block_exploits: 1
    meta:
      managed_by: npmctl
      owner: groupsum-xyz
      resource_id: proxy.groupsum-xyz
